<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tomato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a0f0a;
      --surface: #2b1810;
      --ring-track: #3d2218;
      --ring-work: #e8603a;
      --ring-break: #6dbfa0;
      --text-primary: #f5e6d8;
      --text-secondary: #a07860;
      --btn-bg: #3d2218;
      --btn-hover: #542e20;
      --btn-active-bg: #e8603a;
      --btn-active-text: #1a0f0a;
      --glow-work: rgba(232, 96, 58, 0.35);
      --glow-break: rgba(109, 191, 160, 0.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter Tight', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 420px;
    }

    .wordmark {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .mode-tabs {
      display: flex;
      gap: 0.5rem;
      background: var(--surface);
      border-radius: 999px;
      padding: 4px;
    }

    .mode-tab {
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Inter Tight', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 0.4rem 1.1rem;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .mode-tab.active {
      background: var(--ring-work);
      color: #1a0f0a;
    }

    .mode-tab.break-active {
      background: var(--ring-break);
      color: #1a0f0a;
    }

    /* SVG ring */
    .ring-wrap {
      position: relative;
      width: 240px;
      height: 240px;
      filter: drop-shadow(0 0 28px var(--glow-work));
      transition: filter 0.6s ease;
    }

    .ring-wrap.break-mode {
      filter: drop-shadow(0 0 28px var(--glow-break));
    }

    .ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: var(--ring-track);
      stroke-width: 8;
    }

    .ring-progress {
      fill: none;
      stroke: var(--ring-work);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.6s ease;
    }

    .ring-progress.break-mode {
      stroke: var(--ring-break);
    }

    .timer-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
    }

    .time-display {
      font-family: 'Fraunces', serif;
      font-size: 3.8rem;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1;
    }

    .mode-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 999px;
      font-family: 'Inter Tight', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }

    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: var(--ring-work);
      color: #1a0f0a;
      font-size: 0.95rem;
      padding: 0.75rem 2.4rem;
    }

    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary.break-btn { background: var(--ring-break); }

    .btn-secondary {
      background: var(--btn-bg);
      color: var(--text-secondary);
      font-size: 0.85rem;
      padding: 0.75rem 1.4rem;
    }

    .btn-secondary:hover {
      background: var(--btn-hover);
      color: var(--text-primary);
    }

    /* Pomodoro dots */
    .dots {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ring-track);
      transition: background 0.3s;
    }

    .dot.filled { background: var(--ring-work); }

    .session-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    /* Todo list */
    .todo-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .todo-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-align: center;
    }

    .todo-input-row {
      display: flex;
      gap: 0.5rem;
    }

    .todo-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--ring-track);
      border-radius: 999px;
      color: var(--text-primary);
      font-family: 'Inter Tight', sans-serif;
      font-size: 0.85rem;
      padding: 0.55rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .todo-input::placeholder { color: var(--text-secondary); opacity: 0.6; }
    .todo-input:focus { border-color: var(--ring-work); }

    .todo-add-btn {
      background: var(--ring-work);
      color: #1a0f0a;
      border: none;
      border-radius: 999px;
      font-family: 'Inter Tight', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: filter 0.15s, transform 0.1s;
    }

    .todo-add-btn:hover { filter: brightness(1.1); }
    .todo-add-btn:active { transform: scale(0.94); }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface);
      border-radius: 10px;
      padding: 0.55rem 0.85rem;
      border: 1px solid transparent;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }

    .todo-item.focused {
      border-color: var(--ring-work);
      background: #321a10;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      opacity: 0.4;
    }

    .focus-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--text-secondary);
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .focus-dot:hover {
      border-color: var(--text-primary);
    }

    .todo-item.focused .focus-dot {
      border-color: var(--ring-work);
    }

    .todo-item.done .focus-dot {
      background: var(--text-secondary);
      border-color: var(--text-secondary);
    }

    .todo-text {
      flex: 1;
      font-size: 0.85rem;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .todo-delete {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1rem;
      cursor: pointer;
      opacity: 0;
      padding: 0 0.1rem;
      transition: opacity 0.15s, color 0.15s;
      line-height: 1;
    }

    .todo-item:hover .todo-delete { opacity: 1; }
    .todo-delete:hover { color: var(--text-primary); }

    .focused-banner {
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: #321a10;
      border: 1px solid var(--ring-work);
      border-radius: 10px;
      padding: 0.5rem 0.85rem;
    }

    .focused-banner.visible { display: flex; }

    .focused-banner-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ring-work);
      flex-shrink: 0;
    }

    .focused-banner-text {
      font-size: 0.78rem;
      color: var(--ring-work);
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 400px) {
      .ring-wrap { width: 200px; height: 200px; }
      .time-display { font-size: 3.2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wordmark">Tomato</div>

    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-work" onclick="switchMode('work')">Focus</button>
      <button class="mode-tab" id="tab-break" onclick="switchMode('break')">Break</button>
    </div>

    <div class="ring-wrap" id="ringWrap">
      <svg class="ring-svg" viewBox="0 0 240 240" id="ringSvg">
        <circle class="ring-track" cx="120" cy="120" r="104" />
        <circle class="ring-progress" id="ringProgress" cx="120" cy="120" r="104" />
      </svg>
      <div class="timer-center">
        <div class="time-display" id="timeDisplay">25:00</div>
        <div class="mode-label" id="modeLabel">Focus</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-secondary" id="resetBtn" onclick="resetTimer()">Reset</button>
      <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">Start</button>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:0.5rem;">
      <div class="dots" id="dots">
        <div class="dot" id="dot0"></div>
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
      </div>
      <div class="session-label" id="sessionLabel">Session 1 of 4</div>
    </div>

    <div class="todo-section">
      <div class="todo-label">Working on</div>
      <div class="focused-banner" id="focusedBanner">
        <div class="focused-banner-dot"></div>
        <div class="focused-banner-text" id="focusedBannerText"></div>
      </div>
      <div class="todo-input-row">
        <input class="todo-input" id="todoInput" type="text" placeholder="Add a task…" maxlength="80" />
        <button class="todo-add-btn" onclick="addTodo()" title="Add task">+</button>
      </div>
      <div class="todo-list" id="todoList"></div>
    </div>
  </div>

  <script>
    const MODES = {
      work:  { label: 'Focus', seconds: 25 * 60 },
      break: { label: 'Break', seconds: 5 * 60 },
    };

    let mode = 'work';
    let totalSeconds = MODES.work.seconds;
    let remaining = totalSeconds;
    let running = false;
    let interval = null;
    let completedSessions = 0;

    const circumference = 2 * Math.PI * 104;
    const ringProgress = document.getElementById('ringProgress');
    ringProgress.style.strokeDasharray = circumference;
    ringProgress.style.strokeDashoffset = 0;

    function updateRing() {
      const fraction = remaining / totalSeconds;
      ringProgress.style.strokeDashoffset = circumference * (1 - fraction);
    }

    function updateDisplay() {
      const m = Math.floor(remaining / 60).toString().padStart(2, '0');
      const s = (remaining % 60).toString().padStart(2, '0');
      document.getElementById('timeDisplay').textContent = `${m}:${s}`;
      updateRing();
    }

    function switchMode(newMode) {
      if (running) { clearInterval(interval); running = false; }
      mode = newMode;
      totalSeconds = MODES[newMode].seconds;
      remaining = totalSeconds;

      document.getElementById('modeLabel').textContent = MODES[newMode].label;
      document.getElementById('startBtn').textContent = 'Start';

      const ringWrap = document.getElementById('ringWrap');
      const tabWork = document.getElementById('tab-work');
      const tabBreak = document.getElementById('tab-break');
      const startBtn = document.getElementById('startBtn');

      if (newMode === 'work') {
        ringWrap.classList.remove('break-mode');
        ringProgress.classList.remove('break-mode');
        tabWork.classList.add('active');
        tabWork.classList.remove('break-active');
        tabBreak.classList.remove('active', 'break-active');
        startBtn.classList.remove('break-btn');
      } else {
        ringWrap.classList.add('break-mode');
        ringProgress.classList.add('break-mode');
        tabBreak.classList.add('active', 'break-active');
        tabWork.classList.remove('active');
        startBtn.classList.add('break-btn');
      }

      updateDisplay();
    }

    function toggleTimer() {
      if (running) {
        clearInterval(interval);
        running = false;
        document.getElementById('startBtn').textContent = 'Resume';
      } else {
        running = true;
        document.getElementById('startBtn').textContent = 'Pause';
        interval = setInterval(() => {
          remaining--;
          updateDisplay();
          if (remaining <= 0) {
            clearInterval(interval);
            running = false;
            document.getElementById('startBtn').textContent = 'Start';
            onTimerEnd();
          }
        }, 1000);
      }
    }

    function resetTimer() {
      clearInterval(interval);
      running = false;
      remaining = totalSeconds;
      document.getElementById('startBtn').textContent = 'Start';
      updateDisplay();
    }

    function onTimerEnd() {
      playChime();
      if (mode === 'work') {
        completedSessions = Math.min(completedSessions + 1, 4);
        updateDots();
        // auto-switch to break after a beat
        setTimeout(() => switchMode('break'), 800);
      } else {
        setTimeout(() => switchMode('work'), 800);
      }
    }

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById(`dot${i}`);
        dot.classList.toggle('filled', i < completedSessions);
      }
      const label = completedSessions >= 4
        ? 'All done — take a long break!'
        : `Session ${completedSessions + 1} of 4`;
      document.getElementById('sessionLabel').textContent = label;
    }

    function playChime() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const notes = [523.25, 659.25, 783.99]; // C5 E5 G5
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          const start = ctx.currentTime + i * 0.18;
          gain.gain.setValueAtTime(0, start);
          gain.gain.linearRampToValueAtTime(0.18, start + 0.04);
          gain.gain.exponentialRampToValueAtTime(0.001, start + 0.9);
          osc.start(start);
          osc.stop(start + 0.95);
        });
      } catch (e) { /* audio blocked — silent fallback */ }
    }

    updateDisplay();

    // --- Todo list ---
    let todos = [];
    let focusedId = null;

    const todoInput = document.getElementById('todoInput');
    todoInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    function addTodo() {
      const text = todoInput.value.trim();
      if (!text) return;
      todos.push({ id: Date.now(), text, done: false });
      todoInput.value = '';
      renderTodos();
    }

    function toggleFocus(id) {
      focusedId = focusedId === id ? null : id;
      renderTodos();
    }

    function toggleDone(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.done = !todo.done;
        if (todo.done && focusedId === id) focusedId = null;
        renderTodos();
      }
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      if (focusedId === id) focusedId = null;
      renderTodos();
    }

    function renderTodos() {
      const list = document.getElementById('todoList');
      const banner = document.getElementById('focusedBanner');
      const bannerText = document.getElementById('focusedBannerText');

      list.innerHTML = '';
      todos.forEach(todo => {
        const item = document.createElement('div');
        item.className = 'todo-item' + (todo.id === focusedId ? ' focused' : '') + (todo.done ? ' done' : '');

        const dot = document.createElement('div');
        dot.className = 'focus-dot';
        dot.title = 'Mark as focused';
        dot.onclick = (e) => { e.stopPropagation(); toggleDone(todo.id); };

        const text = document.createElement('div');
        text.className = 'todo-text';
        text.textContent = todo.text;
        text.onclick = () => { if (!todo.done) toggleFocus(todo.id); };

        const del = document.createElement('button');
        del.className = 'todo-delete';
        del.textContent = '×';
        del.title = 'Remove';
        del.onclick = (e) => { e.stopPropagation(); deleteTodo(todo.id); };

        item.appendChild(dot);
        item.appendChild(text);
        item.appendChild(del);
        list.appendChild(item);
      });

      const focused = todos.find(t => t.id === focusedId);
      if (focused) {
        banner.classList.add('visible');
        bannerText.textContent = focused.text;
      } else {
        banner.classList.remove('visible');
      }
    }
  </script>
</body>
</html>
